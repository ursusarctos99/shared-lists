<html xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:extend>

    <!-- Page header -->
    <div class="flex items-center justify-between mb-10">
        <h2 class="text-3xl font-extrabold tracking-tight text-base-content" wicket:id="heading">Welcome!</h2>
        <button class="btn btn-primary rounded-2xl px-6 font-bold
                       shadow-[0_6px_0_rgba(79,0,229,0.30)]
                       hover:shadow-[0_3px_0_rgba(79,0,229,0.30)] hover:translate-y-[3px]
                       active:shadow-none active:translate-y-[6px]
                       transition-all duration-75"
                onclick="document.getElementById('createListModal').showModal()">
            <wicket:message key="list.add"/>
        </button>
    </div>

    <!-- Card grid -->
    <div wicket:id="listContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- gradient class is injected per-item by Java -->
        <div wicket:id="listView"
             class="card relative overflow-hidden rounded-2xl cursor-pointer
                    shadow-[0_4px_20px_rgba(0,0,0,0.12)]
                    hover:shadow-[0_16px_48px_rgba(0,0,0,0.18)]
                    hover:-translate-y-2
                    transition-all duration-200 ease-out group">

            <!-- Lighting highlight: bright top edge, simulates light from above -->
            <div class="absolute inset-x-0 top-0 h-2/5
                        bg-gradient-to-b from-white/30 to-transparent
                        pointer-events-none z-10 rounded-t-2xl"></div>
            <!-- Depth shadow: darker bottom edge for 3D floor feel -->
            <div class="absolute inset-x-0 bottom-0 h-1/4
                        bg-gradient-to-t from-black/15 to-transparent
                        pointer-events-none z-10 rounded-b-2xl"></div>

            <a wicket:id="deleteListLink"
               class="absolute top-3 right-3 z-30
                      w-7 h-7 flex items-center justify-center rounded-xl
                      text-white/60 hover:text-white hover:bg-white/20
                      opacity-0 group-hover:opacity-100
                      transition-all duration-150 text-base leading-none">✕</a>

            <a wicket:id="detailLink"
               class="card-body block relative z-20 text-white hover:text-white">
                <h3 class="card-title text-white drop-shadow-sm mb-1 line-clamp-1"
                    wicket:id="title">Title</h3>
                <p class="text-sm text-white/65 flex-1 line-clamp-2 min-h-10"
                   wicket:id="description">Description</p>
                <div class="flex items-center justify-between mt-4 pt-3 border-t border-white/15">
                    <div class="flex items-center gap-1.5">
                        <span class="bg-white/20 backdrop-blur-sm text-white text-xs
                                     font-bold px-2.5 py-1 rounded-full"
                              wicket:id="entryCount">0</span>
                        <span class="text-xs text-white/55">
                            <wicket:message key="card.items"/>
                        </span>
                    </div>
                    <span class="text-white/35 group-hover:text-white/75
                                 group-hover:translate-x-1
                                 transition-all duration-150 text-xl leading-none">→</span>
                </div>
            </a>
        </div>
    </div>

    <!-- Pager -->
    <div wicket:id="pager"></div>

    <!-- Create List Modal -->
    <dialog id="createListModal" class="modal">
        <div class="modal-box rounded-3xl shadow-2xl ring-1 ring-black/[0.06] p-8">
            <h3 class="font-extrabold text-xl mb-6
                       bg-gradient-to-r from-violet-600 to-pink-500 bg-clip-text text-transparent">
                <wicket:message key="modal.create.title"/>
            </h3>
            <form wicket:id="createForm">
                <div wicket:id="feedback" class="alert alert-error mb-4 text-sm rounded-xl"></div>
                <div class="form-control mb-4">
                    <label class="label pb-1.5">
                        <span class="label-text font-semibold text-base-content/70">
                            <wicket:message key="form.title"/>
                            <span class="text-red-500 ml-0.5">*</span>
                        </span>
                    </label>
                    <input type="text" wicket:id="title" required
                           class="input input-bordered w-full rounded-xl
                                  focus:border-violet-400 focus:outline-none"/>
                </div>
                <div class="form-control mb-7">
                    <label class="label pb-1.5">
                        <span class="label-text font-semibold text-base-content/70">
                            <wicket:message key="form.description"/>
                        </span>
                    </label>
                    <textarea wicket:id="description" rows="3"
                              class="textarea textarea-bordered w-full rounded-xl resize-none
                                     focus:border-violet-400 focus:outline-none"></textarea>
                </div>
                <div class="modal-action mt-0 gap-3">
                    <button type="button" class="btn btn-ghost rounded-xl"
                            onclick="document.getElementById('createListModal').close()">
                        <wicket:message key="form.cancel"/>
                    </button>
                    <a wicket:id="submit"
                       class="btn btn-primary rounded-xl font-bold
                              shadow-[0_4px_0_rgba(79,0,229,0.30)]
                              hover:shadow-[0_2px_0_rgba(79,0,229,0.30)] hover:translate-y-[2px]
                              active:shadow-none active:translate-y-[4px]
                              transition-all duration-75">
                        <wicket:message key="form.create"/>
                    </a>
                </div>
            </form>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

</wicket:extend>
</body>
</html>
