<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" data-theme="light">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shared Lists</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-50 via-white to-pink-50">

<div class="flex flex-col min-h-screen">

    <nav class="navbar bg-white/75 backdrop-blur-xl border-b border-white/60
                shadow-[0_2px_24px_rgba(0,0,0,0.07)] sticky top-0 z-30 px-6">
        <div class="navbar-start">
            <span class="text-xl font-extrabold tracking-tight
                         bg-gradient-to-r from-violet-600 to-pink-500
                         bg-clip-text text-transparent">
                Shared Lists
            </span>
        </div>
        <div class="navbar-center">
            <form wicket:id="searchForm">
                <div class="join">
                    <input type="text" wicket:id="searchInput"
                           class="input join-item w-64 bg-white/80 border-base-200
                                  focus:bg-white focus:outline-none"
                           wicket:message="placeholder:search.placeholder"/>
                    <button type="submit"
                            class="btn btn-square join-item bg-white/80 border-base-200 hover:bg-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-base-content/40"
                             fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
        <div class="navbar-end">
            <a wicket:id="settingsLink"
               class="btn btn-ghost btn-square text-base-content/40
                      hover:text-base-content hover:bg-white/60 rounded-xl"
               wicket:message="aria-label:settings.label">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </a>
        </div>
    </nav>

    <main class="flex-1 p-8 max-w-7xl mx-auto w-full">
        <wicket:child/>
    </main>

</div>
</body>
</html>
